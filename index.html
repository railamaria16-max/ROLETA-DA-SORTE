<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta da Sorte</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <header>
        <h1>🎁 ROLETA DA SORTE</h1>
        <p>Gire a roleta e descubra seu prêmio.</p>
    </header>

    <div class="roleta-container">
        <div class="ponteiro"></div>
      <div id="roleta">
    <div class="setor s1"><div class="conteudo-setor"><span class="titulo-brinde">Brinde</span><img src="img/rexona.png" class="logo-setor"><span>Rexona</span></div></div>
    <div class="setor s2"><div class="conteudo-setor"><span>Tente Outra<br>Vez</span></div></div>
    <div class="setor s3"><div class="conteudo-setor"><span class="titulo-brinde">Brinde</span><img src="img/omo.png" class="logo-setor"><span>OMO</span></div></div>
    <div class="setor s4"><div class="conteudo-setor"><span class="titulo-brinde">Brinde</span><img src="img/hellmanns.png" class="logo-setor"><span>Hellmann's</span></div></div>
    <div class="setor s5"><div class="conteudo-setor"><span class="titulo-brinde">Brinde</span><img src="img/clear.png" class="logo-setor"><span>Clear</span></div></div>
    <div class="setor s6"><div class="conteudo-setor"><span class="titulo-brinde">Brinde</span><img src="img/necessaire.png" class="logo-setor"><span>Necessaire</span></div></div>
    <div class="setor s7"><div class="conteudo-setor"><span>Brinde<br>Surpresa</span></div></div>
    <div class="setor s8"><div class="conteudo-setor"><span>Tente Outra<br>Vez</span></div></div>
</div>
    </div>

    <button id="girar">GIRAR ROLETA</button>
</div>

<div id="popup">
    <div class="popup-box">
        <h2>🎉 Parabéns!</h2>
        <h3 id="resultado"></h3>
        <button id="fechar">Fechar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
