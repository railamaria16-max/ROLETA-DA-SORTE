<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Roleta da Sorte</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <h1>🎁 ROLETA DA SORTE</h1>

    <p>Clique em girar e descubra seu prêmio.</p>

    <div class="roleta-container">

        <div class="ponteiro"></div>

        <div id="roleta">

            <!-- Setor 1 -->
            <div class="setor s1">
                <span>Rexona</span>
            </div>

            <!-- Setor 2 -->
            <div class="setor s2">
                <span>Tente Outra<br>Vez</span>
            </div>

            <!-- Setor 3 -->
            <div class="setor s3">
                <span>OMO</span>
            </div>

            <!-- Setor 4 -->
            <div class="setor s4">
                <span>Hellmann's</span>
            </div>

            <!-- Setor 5 -->
            <div class="setor s5">
                <span>Clear</span>
            </div>

            <!-- Setor 6 -->
            <div class="setor s6">
                <span>Necessaire</span>
            </div>

            <!-- Setor 7 -->
            <div class="setor s7">
                <span>Surpresa</span>
            </div>

            <!-- Setor 8 -->
            <div class="setor s8">
                <span>Tente Outra<br>Vez</span>
            </div>

            <div class="centro">
                GIRAR
            </div>

        </div>

    </div>

    <button id="girar">
        GIRAR ROLETA
    </button>

</div>

<div id="popup">

    <div class="popup-box">

        <h2>🎉 Parabéns!</h2>

        <h3 id="resultado"></h3>

        <button id="fechar">
            Fechar
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
